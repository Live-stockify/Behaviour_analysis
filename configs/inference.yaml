# Inference runtime configuration
# Edit this file to change behavior without touching code

# ============================================================
# Model
# ============================================================
model:
  weights: models/livestockify_v1.pt
  conf_threshold: 0.15      # Lower = more detections, more false positives
  iou_threshold: 0.45       # NMS IoU threshold
  imgsz: 640                # Input size for the model
  device: cpu               # cpu, mps, or cuda

# ============================================================
# Video source
# ============================================================
# mode: "single" (one camera) or "multi" (cycle through multiple cameras)
source:
  mode: single              # Change to "multi" for multi-camera cycling

  # --- SINGLE MODE ---
  # Used when mode=single (testing or one-camera deployment)
  type: file                # "file" or "rtsp"
  file_path: data/test_clips/test.mp4
  rtsp_url: ""              # Fill in when using rtsp

  # --- MULTI MODE ---
  # Used when mode=multi (production with multiple cameras)
  # The runner will cycle through these cameras in order, processing
  # one frame from each before moving to the next.
  cameras:
    - id: cam1
      rtsp_url: ""           # Fill with actual RTSP URL after camera setup
      enabled: true
    - id: cam2
      rtsp_url: ""
      enabled: true
    - id: cam3
      rtsp_url: ""
      enabled: true
    - id: cam4
      rtsp_url: ""
      enabled: true
    - id: cam5
      rtsp_url: ""
      enabled: true
    - id: cam6
      rtsp_url: ""
      enabled: true
    - id: cam7
      rtsp_url: ""
      enabled: true
    - id: cam8
      rtsp_url: ""
      enabled: true

  # Reconnect settings (rtsp only, applies to all cameras)
  reconnect_delay_seconds: 5
  max_reconnect_attempts: 100

# ============================================================
# Frame sampling
# ============================================================
sampling:
  # In single mode: process 1 frame every N seconds
  # In multi mode: N seconds BETWEEN each camera (so 8 cameras × 1s = ~8s cycle)
  interval_seconds: 1        # 1s between cameras in multi, 5s in single
  warmup_frames: 3           # Discard first N frames per camera

# ============================================================
# Output
# ============================================================
output:
  json_dir: data/output/detections

  # File naming: detections_YYYY-MM-DD.jsonl
  format: jsonl
  daily_rotation: true

  # Save annotated frames? (for debugging - takes disk space)
  save_frames: false
  frames_dir: data/output/frames

# ============================================================
# Farm metadata
# ============================================================
# Included in every JSON record
farm:
  id: dubbacharla
  name: Dubbacharla Farm
  location: Telangana, India

# ============================================================
# Logging
# ============================================================
logging:
  level: INFO
  log_file: logs/inference.log
  rotation: 10 MB
  retention: 7 days