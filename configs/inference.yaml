# LiveStockify Inference Configuration
# Dubbacharla deployment — 4 farms, 8 cameras on farm ak1

model:
  weights: models/livestockify_v1.pt
  conf_threshold: 0.15
  iou_threshold: 0.45
  imgsz: 640
  device: cpu

source:
  mode: multi
  type: file
  file_path: data/test_clips/test.mp4
  rtsp_url: ""
  reconnect_delay_seconds: 5
  max_reconnect_attempts: 100

# ============================================================
# Farms and Cameras
# ============================================================
# name_backend: the farm name the backend API expects
# id: internal identifier (used in logs)
farms:
  - id: ak1
    name: Dubbacharla AK1
    name_backend: ak1
    location: Dubbacharla, Telangana
    cameras:
      - id: cam1
        rtsp_url: "rtsp://admin:Live@2023@192.168.1.10:554/stream1"
        enabled: true
      - id: cam2
        rtsp_url: "rtsp://admin:Live@2023@192.168.1.10:554/2/stream1"
        enabled: true
      - id: cam3
        rtsp_url: "rtsp://admin:Live@2023@192.168.1.10:554/3/stream1"
        enabled: true
      - id: cam4
        rtsp_url: "rtsp://admin:Live@2023@192.168.1.10:554/4/stream1"
        enabled: true
      - id: cam5
        rtsp_url: "rtsp://admin:Live@2023@192.168.1.10:554/5/stream1"
        enabled: true
      - id: cam6
        rtsp_url: "rtsp://admin:Live@2023@192.168.1.10:554/6/stream1"
        enabled: true
      - id: cam7
        rtsp_url: "rtsp://admin:Live@2023@192.168.1.10:554/7/stream1"
        enabled: true
      - id: cam8
        rtsp_url: "rtsp://admin:Live@2023@192.168.1.10:554/8/stream1"
        enabled: true

  - id: ak2
    name: Dubbacharla AK2
    name_backend: ak2
    location: Dubbacharla, Telangana
    cameras:
      - id: cam1
        rtsp_url: ""
        enabled: false

  - id: ak3
    name: Dubbacharla AK3
    name_backend: ak3
    location: Dubbacharla, Telangana
    cameras:
      - id: cam1
        rtsp_url: ""
        enabled: false

  - id: ak4
    name: Dubbacharla AK4
    name_backend: ak4
    location: Dubbacharla, Telangana
    cameras:
      - id: cam1
        rtsp_url: ""
        enabled: false

sampling:
  interval_seconds: 1
  warmup_frames: 3

output:
  json_dir: data/output/detections
  format: jsonl
  daily_rotation: true
  save_frames: false
  frames_dir: data/output/frames

# ============================================================
# Data Pusher — pushes detection results to backend API
# ============================================================
pusher:
  pi_id: PI-001
  backend_url: "https://api.livestockify.com/api/farm-ml"              # Your backend team's API URL (e.g., https://api.kuppismart.com/api/farm-ml)
  backend_api_key: pidata2026
  interval_seconds: 300        # Push every 5 minutes (300s). Adjust as needed.

# ============================================================
# Local API Server (for direct access via Tailscale)
# ============================================================
api:
  host: 0.0.0.0
  port: 8000
  api_key: Livestockify23

# ============================================================
# Logging
# ============================================================
logging:
  level: INFO
  log_file: logs/inference.log
  rotation: 10 MB
  retention: 7 days